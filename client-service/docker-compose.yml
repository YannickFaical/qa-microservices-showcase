version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: clientdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  client-service:
    build: .
    container_name: client-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql-db
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod


volumes:
  db_data: