version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: clientdb
    ports:
      - "3309:3306"   # port hôte 3309 -> port container 3306
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
    restart: always

  client-service:
    build: .
    container_name: client-service
    ports:
      - "8090:8090"
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod

volumes:
  db_data: