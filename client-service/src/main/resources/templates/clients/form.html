<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Formulaire Client</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="container">
    <h1 th:text="${client.id != null} ? 'Modifier le client' : 'Nouveau client'"></h1>

    <form th:action="${client.id != null} ? @{/clients/{id}/edit(id=${client.id})} : @{/clients/new}"
          th:object="${client}" method="post" id="client-form">

        <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" th:field="*{nom}" placeholder="Nom complet"/>
            <span class="error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></span>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="email@exemple.com"/>
            <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
            <label for="telephone">Téléphone</label>
            <input type="text" id="telephone" th:field="*{telephone}" placeholder="+212 6XX XXX XXX"/>
            <span class="error" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></span>
        </div>

        <div class="form-group">
            <label for="statut">Statut</label>
            <select id="statut" th:field="*{statut}">
                <option value="ACTIF">Actif</option>
                <option value="INACTIF">Inactif</option>
                <option value="SUSPENDU">Suspendu</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn btn-primary">Enregistrer</button>
            <a href="/clients" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
</body>
</html>
